name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          registry-url: https://npm.pkg.github.com

      - run: npm ci

      - run: npm run build

      - name: Commit dist if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/index.js
          if git diff --staged --quiet; then
            echo "dist/index.js unchanged, skipping commit."
          else
            git commit -m "ci: rebuild dist"
            git push
          fi

      - name: Check if version already released
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q "v${VERSION}"; then
            echo "v${VERSION} already released, skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.check.outputs.skip != 'true'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag release
        if: steps.check.outputs.skip != 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          MAJOR=$(echo "$VERSION" | cut -d. -f1)

          git tag "v${VERSION}"
          git tag "v${MAJOR}" --force
          git push origin "v${VERSION}"
          git push origin "v${MAJOR}" --force
